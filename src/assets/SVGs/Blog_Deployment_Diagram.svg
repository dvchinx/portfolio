<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de despliegue - Blog</title>
  <desc id="desc">Flujo de build con Vite y despliegue con Docker y Nginx para blog.jesusflorez.cloud.</desc>

  <defs>
    <style>
      .bg { fill: #0a0f1b; }
      .panel { fill: #11182b; stroke: #3d4f7c; stroke-width: 1.2; rx: 12; }
      .cluster { fill: #151f36; stroke: #7289c0; stroke-width: 1.1; rx: 10; }
      .node { fill: #1d2945; stroke: #8ea3d6; stroke-width: 1.1; rx: 8; }
      .cluster-label { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #ffffff; }
      .node-text { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #ffffff; }
      .arrow { stroke: #ffffff; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-label { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #ffffff; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #ffffff; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; fill: #d7e2ff; }
    </style>

    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ffffff" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="980" />
  <rect class="panel" x="24" y="24" width="1752" height="932" />

  <text class="title" x="56" y="78">Build and Deployment Pipeline</text>
  <text class="subtitle" x="56" y="106">Docker multi-stage + Nginx serving for blog.jesusflorez.cloud</text>

  <rect class="cluster" x="60" y="150" width="900" height="260" />
  <text class="cluster-label" x="90" y="185">Stage1_Build</text>

  <rect class="node" x="92" y="228" width="190" height="72" />
  <text class="node-text" x="187" y="270" text-anchor="middle">src/ + package.json</text>

  <rect class="node" x="340" y="228" width="150" height="72" />
  <text class="node-text" x="415" y="270" text-anchor="middle">npm ci</text>

  <rect class="node" x="548" y="214" width="210" height="100" />
  <text class="node-text" x="653" y="258" text-anchor="middle">npm run build</text>
  <text class="node-text" x="653" y="282" text-anchor="middle">vite build</text>

  <rect class="node" x="816" y="214" width="120" height="100" />
  <text class="node-text" x="876" y="258" text-anchor="middle">dist/</text>
  <text class="node-text" x="876" y="282" text-anchor="middle">assets</text>

  <rect class="cluster" x="980" y="150" width="760" height="520" />
  <text class="cluster-label" x="1010" y="185">Stage2_Serve</text>

  <rect class="node" x="1012" y="228" width="250" height="118" />
  <text class="node-text" x="1137" y="270" text-anchor="middle">nginx.conf</text>
  <text class="node-text" x="1137" y="294" text-anchor="middle">try_files (SPA)</text>
  <text class="node-text" x="1137" y="318" text-anchor="middle">cache + gzip + headers</text>

  <rect class="node" x="1320" y="246" width="210" height="82" />
  <text class="node-text" x="1425" y="293" text-anchor="middle">/usr/share/nginx/html</text>

  <rect class="node" x="1320" y="404" width="320" height="100" />
  <text class="node-text" x="1480" y="446" text-anchor="middle">blog.jesusflorez.cloud</text>
  <text class="node-text" x="1480" y="470" text-anchor="middle">docker run -p 8080:80</text>

  <rect class="node" x="92" y="516" width="260" height="118" />
  <text class="node-text" x="222" y="560" text-anchor="middle">Development</text>
  <text class="node-text" x="222" y="584" text-anchor="middle">npm run dev + Vite HMR</text>
  <text class="node-text" x="222" y="608" text-anchor="middle">localhost:5173</text>

  <line class="arrow" x1="282" y1="264" x2="340" y2="264" />
  <line class="arrow" x1="490" y1="264" x2="548" y2="264" />
  <line class="arrow" x1="758" y1="264" x2="816" y2="264" />
  <line class="arrow" x1="936" y1="264" x2="1012" y2="286" />
  <text class="arrow-label" x="948" y="246">COPY --from=build</text>

  <line class="arrow" x1="1262" y1="286" x2="1320" y2="286" />
  <line class="arrow" x1="1425" y1="328" x2="1425" y2="404" />
  <text class="arrow-label" x="1440" y="370">serve static app</text>

  <line class="arrow" x1="222" y1="516" x2="222" y2="420" />
  <text class="arrow-label" x="236" y="470">dev workflow</text>
</svg>
